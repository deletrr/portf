<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Danilo Paulino | Portfólio Full-Stack & IoT</title>
    <meta name="description" content="Portfólio de Danilo Paulino — Desenvolvedor Full-Stack, especialista em IoT, Home Lab e segurança. Projetos, skills e certificados." />

    <meta property="og:title" content="Danilo Paulino | Portfólio" />
    <meta property="og:description" content="Projetos, especialidades e credenciais de Danilo Paulino." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="./og-image.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="./og-image.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="./style.css" />
  </head>

  <body class="dark">
    <div class="app">
      <div class="wave-bg" aria-hidden="true">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <canvas id="waveCanvas"></canvas>
        <div class="vignette"></div>
      </div>

      <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
          <div class="brand-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></svg>
          </div>
          <span class="brand-name">Danilo Paulino</span>
        </div>
        <nav class="sidebar-nav" id="sidebarNav"></nav>
        <div class="sidebar-foot">© <a href="https://media1.tenor.com/m/CU-jv8_yz7AAAAAd/dancing-at-the-ghetto-cat-meme.gif"><span id="year"></span> Danilo Paulino</a></div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div class="topbar-left">
            <button class="round-btn ghost" id="toggleSidebar" aria-label="Alternar menu">
              <svg id="iconChevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
              <svg id="iconMenu" class="hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <button class="round-btn outlined" id="toggleTheme" aria-label="Alternar tema">
              <span class="theme-icons">
                <svg id="iconSun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
                <svg id="iconMoon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
              </span>
            </button>
          </div>
          <div class="topbar-right">
            <button class="pill-btn primary" id="contactBtn">Contato</button>
            <button class="avatar-btn" id="avatarBtn" aria-label="Sobre mim">
              <img src="https://i.scdn.co/image/ab6775700000ee857bbe4aebb43f8cf1ede4803a" alt="Danilo Paulino" />
            </button>
          </div>
        </header>

        <div class="content" id="content"></div>
      </main>

      <nav class="mobile-nav" id="mobileNav"></nav>
    </div>

    <div class="modal" id="previewModal" aria-hidden="true">
      <div class="modal-backdrop" data-close></div>
      <div class="modal-card">
        <div class="modal-head">
          <h3 id="modalTitle">Preview</h3>
          <div class="modal-actions">
            <button class="icon-btn" id="modalOpen" aria-label="Abrir em nova guia">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            </button>
            <button class="icon-btn" data-close aria-label="Fechar">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
        </div>
        <div class="modal-body" id="modalBody"></div>
      </div>
    </div>

    <script src="./data.js"></script>
    <script src="./script.js"></script>
